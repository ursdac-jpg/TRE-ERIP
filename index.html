<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Assistant Parcours Professionnel</title>

  <!-- Bootstrap + icones -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

  <!-- Styles de l'application -->
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div id="app"></div>

  <!-- TACHE (retour utilisateur : "je veux aussi des modes : mode sombre,
       une variante de couleurs et un mode daltonien... l'icone doit être
       présente tout le long, sur toutes les pages") : en dehors de #app
       (jamais régénéré par le rendu JS des pages), pour rester visible
       quel que soit l'écran affiché. Câblé une seule fois au chargement
       (voir app.js, initPreferencesAffichage()). -->
  <button type="button" id="btnPreferencesAffichage" aria-label="Préférences d'affichage" title="Préférences d'affichage">&#128065;</button>
  <div id="panneauPreferencesAffichage" hidden>
    <h6>&#128065; Affichage</h6>
    <div class="pref-affichage-groupe">
      <span class="pref-affichage-label">Thème</span>
      <button type="button" data-pref-theme="clair">Clair</button>
      <button type="button" data-pref-theme="sombre">Sombre</button>
    </div>
    <div class="pref-affichage-groupe">
      <span class="pref-affichage-label">Couleur d'accent</span>
      <button type="button" data-pref-accent="bleu">Bleu</button>
      <button type="button" data-pref-accent="orange">Orange</button>
      <button type="button" data-pref-accent="vert">Vert</button>
    </div>
    <div class="pref-affichage-groupe">
      <span class="pref-affichage-label">Mode daltonien</span>
      <button type="button" data-pref-daltonien="0">Désactivé</button>
      <button type="button" data-pref-daltonien="1">Activé</button>
    </div>
    <div class="pref-affichage-groupe">
      <span class="pref-affichage-label">Taille du texte</span>
      <button type="button" data-pref-taille="normal">Normal</button>
      <button type="button" data-pref-taille="grand">Grand</button>
      <button type="button" data-pref-taille="tres-grand">Très grand</button>
    </div>
    <div class="pref-affichage-groupe">
      <span class="pref-affichage-label">Police</span>
      <button type="button" data-pref-police="defaut">Défaut</button>
      <button type="button" data-pref-police="arial">Arial</button>
      <button type="button" data-pref-police="times">Times New Roman</button>
      <button type="button" data-pref-police="lisible">Lisible (Verdana)</button>
    </div>
  </div>

  <!-- Ordre important : du plus stable (donnees + moteur) au plus mouvant (interface) -->
  <!-- charset UTF-8 explicite : garantit un affichage correct des accents en ouverture locale -->
  <script src="data/metiers.js" charset="UTF-8"></script>
  <script src="data/actionsProfessionnelles.js" charset="UTF-8"></script>
  <script src="data/personnesMaterielsLieux.js" charset="UTF-8"></script>
  <script src="data/environnementsTravail.js" charset="UTF-8"></script>
  <script src="data/valeursProfessionnelles.js" charset="UTF-8"></script>
  <script src="data/baseConnaissancesERIP.js" charset="UTF-8"></script>
  <script src="data/referentielMetiersERIP.js" charset="UTF-8"></script>
  <script src="data/metiersComplementaires.js" charset="UTF-8"></script>
  <script src="data/dictionnaireLexicalERIP.js" charset="UTF-8"></script>
  <script src="data/toleranceOrthographiqueERIP.js" charset="UTF-8"></script>
  <script src="data/extractionConceptsERIP.js" charset="UTF-8"></script>
  <script src="data/moteurPertinenceRechercheERIP.js" charset="UTF-8"></script>
  <script src="modules/cv-core/extraireDonneesCV.js" charset="UTF-8"></script>
  <script src="modules/cv-core/normaliserDonneesCV.js" charset="UTF-8"></script>
  <script src="modules/cv-editor/rendreTemplate.js" charset="UTF-8"></script>
  <script src="modules/cv-editor/modelesDisponibles.js" charset="UTF-8"></script>
  <!-- TACHE (Option C : export Word natif) : genere de vrais .docx par
       modele (au lieu de convertir le HTML deja rendu) -- voir le
       commentaire d'en-tete du fichier pour le detail. -->
  <script src="modules/cv-editor/exportDocxNatifCV.js" charset="UTF-8"></script>
  <!-- TACHE (nouveaux modeles CV, absents de la base) : etend
       GENERATEURS_DOCX_NATIFS_CV/MODELES_AVEC_DOCX_NATIF_CV, doit donc
       charger APRES exportDocxNatifCV.js. -->
  <script src="modules/cv-editor/exportDocxNatifCV_NouveauxModeles.js" charset="UTF-8"></script>
  <!-- TACHE (refonte "Aperçu et finalisation" : palette de couleurs) :
       ajoute la recoloration par-dessus les generateurs existants --
       doit charger APRES exportDocxNatifCV.js ET
       exportDocxNatifCV_NouveauxModeles.js (utilise leurs fonctions). -->
  <script src="modules/cv-editor/coloriationDocxNatifCV.js" charset="UTF-8"></script>
  <!-- TACHE (format A5) : mini-CV, contenu recadre par le meme moteur de
       decision IA que le format complet (capacites plus serrees) + page
       reelle A5 -- doit charger APRES exportDocxNatifCV.js,
       exportDocxNatifCV_NouveauxModeles.js et coloriationDocxNatifCV.js
       (reutilise leurs fonctions et constantes). -->
  <script src="modules/cv-editor/formatA5CV.js" charset="UTF-8"></script>
  <!-- Moteur Composeur (Bêta) — voir architecture-moteur-cv.md. Systeme
       independant des modeles ci-dessus (isolation, §0.1 du contrat
       d'architecture) : point de contact unique = l'interception ajoutee
       en tete de genererDocxNatifCVFormat() (formatA5CV.js, charge juste
       au-dessus) + l'entree 'composeur' dans MODELES_CV_DISPONIBLES
       (modelesDisponibles.js). Ordre ci-dessous = ordre des couches
       (① a ⑤), simple convention de lecture (declarations de fonctions,
       resolues au moment de l'appel, pas du chargement). -->
  <script src="modules/cv-composeur/composeurProfil.js" charset="UTF-8"></script>
  <script src="modules/cv-composeur/composeurComposants.js" charset="UTF-8"></script>
  <script src="modules/cv-composeur/composeurRegles.js" charset="UTF-8"></script>
  <script src="modules/cv-composeur/composeurComposition.js" charset="UTF-8"></script>
  <!-- TACHE (contrat composeur-strategies-cv-v2.md, étape 2) : nouvelle
       couche, ajoutée en cohabitation avec l'existant -- dépend de
       calculerScoresStrategies() (decouverteStrategie.js, chargé plus
       bas dans ce fichier), mais la résolution ne se fait qu'au moment
       de l'appel (jamais au chargement), donc l'ordre exact entre les
       deux fichiers n'a pas d'importance -- déjà vérifié pour plusieurs
       autres cas similaires dans ce projet. -->
  <script src="modules/cv-composeur/composeurStrategies.js" charset="UTF-8"></script>
  <script src="modules/cv-composeur/composeurTheme.js" charset="UTF-8"></script>
  <script src="modules/cv-composeur/composeurRender.js" charset="UTF-8"></script>
  <script src="modules/cv-composeur/composeurMoteur.js" charset="UTF-8"></script>
  <!-- TACHE (Mini CV (A5), mise en page dediee) : structure propre (photo
       centree, 2 colonnes compactes), plus une reduction du modele A4
       choisi -- doit charger avant ou apres formatA5CV.js (peu importe,
       resolution des fonctions au moment de l'appel, pas du chargement). -->
  <script src="modules/cv-editor/miniCvA5.js" charset="UTF-8"></script>
  <!-- TACHE (5 nouveaux modeles CV, references PowerPoint) : "Chic",
       premier des 5 -- doit charger APRES exportDocxNatifCV.js,
       coloriationDocxNatifCV.js, formatA5CV.js et miniCvA5.js (utilise
       leurs fonctions/listes, etend GENERATEURS_DOCX_NATIFS_CV et
       MODELES_AVEC_DOCX_NATIF_CV/COULEURS/FORMAT_A5). -->
  <script src="modules/cv-editor/exportDocxNatifCV_Chic.js" charset="UTF-8"></script>
  <!-- TACHE (Option pdfmake : export PDF natif) : genere de vrais PDF
       vectoriels par modele, en repli sur "Imprimer" du navigateur si
       indisponible -- voir le commentaire d'en-tete du fichier. -->
  <!-- TACHE (simplification : DOCX seul) : exportPdfNatifCV.js retire --
       le bouton PDF a ete supprime de l'export CV (voir app.js), ce
       fichier n'est plus jamais appele. -->
  <!-- <script src="modules/cv-editor/exportPdfNatifCV.js" charset="UTF-8"></script> -->
  <!-- TACHE (Option GrapesJS : personnalisation visuelle, premiere
       version) : editeur plein ecran, voir le commentaire d'en-tete du
       fichier pour la limite assumee sur l'export. -->
  <!-- TACHE (simplification : DOCX seul) : personnalisationCV.js retire --
       le bouton Personnaliser a ete supprime de l'export CV (voir
       app.js), ce fichier n'est plus jamais appele. -->
  <!-- <script src="modules/cv-editor/personnalisationCV.js" charset="UTF-8"></script> -->
  <!-- TACHE (simplification : DOCX seul + filet de secours + apercu
       integre) : voir le commentaire d'en-tete de chaque fichier. -->
  <script src="modules/cv-editor/exportBlocsTexteCV.js" charset="UTF-8"></script>
  <script src="modules/cv-editor/apercuDocxIntegre.js" charset="UTF-8"></script>
  <script src="modules/lettre-core/normaliserDonneesLettre.js" charset="UTF-8"></script>
  <script src="modules/lettre-editor/modelesDisponiblesLettre.js" charset="UTF-8"></script>
  <!-- TACHE (traitement DOCX natif etendu a la lettre) : meme principe
       que exportDocxNatifCV.js, reutilise sa fonction de chargement de
       la librairie docx (chargee juste au-dessus). -->
  <script src="modules/lettre-editor/exportDocxNatifLettre.js" charset="UTF-8"></script>
  <script src="modules/entretien-editor/normaliserDonneesEntretien.js" charset="UTF-8"></script>
  <script src="modules/entretien-editor/modelesDisponiblesEntretien.js" charset="UTF-8"></script>
  <!-- TACHE (traitement DOCX natif etendu a l'entretien) : idem. -->
  <script src="modules/entretien-editor/exportDocxNatifEntretien.js" charset="UTF-8"></script>
  <!-- TACHE (couleurs + 3 formats pour la lettre et l'entretien, comme
       pour le CV) : reutilise PALETTES_COULEURS_CV (coloriationDocxNatifCV.js)
       et _dnTronquerTexte()/_dnTaillePageA5() (formatA5CV.js), deja
       charges avant ce point -- voir le commentaire d'en-tete du fichier. -->
  <script src="modules/cv-editor/formatsLettreEntretien.js" charset="UTF-8"></script>
  <!-- TACHE (filet de secours etendu a la lettre et l'entretien) : meme
       principe que exportBlocsTexteCV.js. -->
  <script src="modules/cv-editor/exportBlocsTexteLettreEntretien.js" charset="UTF-8"></script>
  <!-- Module « Découverte et valorisation des compétences » — voir
       module-decouverte-valorisation-competences.md et
       moteur-ia-raisonnement.md. Système indépendant, même principe
       d'isolation que le Composeur (Bêta) : point de contact unique =
       la tuile ajoutée dans la Boîte à outils (ouvrirChoixPreparationAccueil,
       modules/cv-editor/... non, metiers.js) qui appelle
       demarrerDecouverteCompetences() (decouverteMoteur.js), point
       d'entrée UNIQUE du module. Ordre ci-dessous : du plus stable
       (structures de données) au plus mouvant (interface), même
       logique que le reste de l'application. -->
  <script src="modules/decouverte-competences/decouverteClassification.js" charset="UTF-8"></script>
  <script src="modules/decouverte-competences/decouverteAnalyse.js" charset="UTF-8"></script>
  <script src="modules/decouverte-competences/decouverteRaffinement.js" charset="UTF-8"></script>
  <script src="modules/decouverte-competences/decouverteStrategie.js" charset="UTF-8"></script>
  <script src="modules/decouverte-competences/decouverteMapping.js" charset="UTF-8"></script>
  <script src="modules/decouverte-competences/decouverteParcours.js" charset="UTF-8"></script>
  <script src="modules/decouverte-competences/decouverteMoteur.js" charset="UTF-8"></script>
  <script src="js/app.js" charset="UTF-8"></script>

</body>
</html>
