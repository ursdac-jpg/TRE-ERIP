<!--
  modules/cv-editor/test.html
  ----------------------------------------------------------------
  Page de TEST ISOLEE, independante de l'application principale (ERIP).
  Objectif unique : valider visuellement le moteur de rendu generique
  (rendreTemplate) avec le modele "Moderne", sans toucher a index.html
  ni au parcours utilisateur existant.

  Les fonctions/donnees ci-dessous (dossier de test, deduireCompetences,
  obtenirSavoirs, categorieCompetence) sont des SUBSTITUTS FACTICES,
  uniquement pour ce test : dans l'application reelle, ces elements
  proviennent de js/app.js et des reponses de la personne au parcours.
-->
<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Test - Moteur de rendu CV (modele Moderne)</title>
</head>
<body>

  <div id="zoneApercu">Chargement de l'apercu...</div>

  <script src="../cv-core/extraireDonneesCV.js" charset="UTF-8"></script>
  <script src="../cv-core/normaliserDonneesCV.js" charset="UTF-8"></script>
  <script src="rendreTemplate.js" charset="UTF-8"></script>

  <script>
    // ---------- DONNEES FACTICES DE TEST (pas de vraies donnees) ----------
    var categorieCompetence = {
      'Relation client': 'Savoir-etre',
      'Organisation': 'Savoir-etre',
      'Bureautique': 'Savoir-faire',
      'Gestion administrative': 'Savoir-faire'
    };
    function deduireCompetences() {
      return ['Relation client', 'Organisation', 'Bureautique', 'Gestion administrative'];
    }
    function obtenirSavoirs() {
      return ['Bases de comptabilite', 'Reglementation transport'];
    }

    var dossierTest = {
      identite: {
        civilite: 'Madame', nom: 'Dupont', prenom: 'Julie',
        telephone: '06 00 00 00 00', email: 'julie.dupont@exemple.fr',
        adresse: '1 rue de Test', ville: 'Bordeaux', age: '32'
      },
      metierCible: 'Assistante administrative',
      secteurCible: null,
      experiences: [
        { poste: 'Assistante administrative', entreprise: 'ACME', lieu: 'Bordeaux', dateDebut: '2020-01', dateFin: '2022-06', missions: 'Accueil, classement, gestion du courrier.' },
        { poste: 'Secretaire', entreprise: 'ABC Conseil', lieu: 'Paris', dateDebut: '2022-07', dateFin: '', missions: 'Gestion des agendas, redaction de courriers.' }
      ],
      experiencesPerso: [
        { intitule: 'Gestion administrative d\'une association', detail: 'Suivi des adherents et des cotisations.' }
      ],
      niveauFormation: { niveauVisible: 'Bac +2', intitule: 'BTS Gestion administrative', annee: '2019' },
      certifications: ['PIX', 'SST'],
      langues: [ { langue: 'Anglais', niveau: 'B2' } ],
      permis: { possede: true, categories: ['B'], vehicule: true },
      contrat: ['CDI', 'CDD'],
      tempsTravail: ['Temps plein'],
      loisirs: ['Lecture', 'Randonnee'],
      engagements: ['Benevolat associatif'],
      texteAmelioreCanva: ''
    };

    // ---------- CHARGEMENT DU MODELE ET RENDU ----------
    var zone = document.getElementById('zoneApercu');

    Promise.all([
      fetch('templates/moderne/template.html').then(function (r) { return r.text(); }),
      fetch('templates/moderne/style.css').then(function (r) { return r.text(); })
    ]).then(function (resultats) {
      var templateHtml = resultats[0];
      var styleCss = resultats[1];

      var objetCV = normaliserDonneesCV(dossierTest);
      var htmlRendu = rendreTemplate(objetCV, templateHtml);

      var styleEl = document.createElement('style');
      styleEl.textContent = styleCss;
      document.head.appendChild(styleEl);

      zone.innerHTML = htmlRendu;
    }).catch(function (erreur) {
      zone.textContent = 'Erreur de chargement du modele : ' + erreur.message +
        ' (cette page doit etre ouverte via un serveur web, pas en double-cliquant sur le fichier).';
    });
  </script>

</body>
</html>
