<!--
  modules/lettre-editor/templates/sobre/template.html
  ----------------------------------------------------------------
  Gabarit du modele "Sobre". Aucune donnee en dur : uniquement des
  marqueurs {{...}} remplaces par rendreTemplate() (deja generique,
  reutilise tel quel depuis le module CV) avec l'objet produit par
  normaliserDonneesLettre().

  Le corps de la lettre est directement editable (contenteditable),
  cable depuis la fenetre d'apercu (voir chargerEtAfficherApercuLettre()
  dans app.js) -- pas de logique ici, uniquement la structure HTML.
-->
<div class="lettre-sobre">

  <div class="lettre-sobre-expediteur">
    <p>{{identite.prenom}} {{identite.nom}}</p>
    <p>{{identite.adresse}}</p>
    <p>{{identite.ville}}</p>
    <p>{{identite.telephone}}</p>
    <p>{{identite.email}}</p>
  </div>

  <div class="lettre-sobre-date">{{date}}</div>

  {{#if objet}}
  <div class="lettre-sobre-objet"><strong>Objet :</strong> {{objet}}</div>
  {{/if}}

  <div class="lettre-sobre-corps" id="lettreTexteEditable" contenteditable="true">{{texte}}</div>

</div>
